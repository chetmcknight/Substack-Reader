
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StackReader Pro - The professional RSS reader and analyzer for Substack.">
    <meta name="theme-color" content="#050505">
    
    <!-- Resource Hints for Lightning Speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://corsproxy.io">
    <link rel="dns-prefetch" href="https://api.allorigins.win">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stackreaderpro.app/">
    <meta property="og:title" content="StackReader Pro">
    <meta property="og:description" content="The professional RSS reader and analyzer for Substack. Powered by Gemini AI.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=1200&auto=format&fit=crop">

    <title>StackReader Pro | Professional Feed Engine</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23FF3B5C'/%3E%3Cpath d='M7 6h10v2H7zM7 10h10v2H7zM7 14h10l-5 4.5-5-4.5v-4z' fill='white'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23FF3B5C'/%3E%3Cpath d='M7 6h10v2H7zM7 10h10v2H7zM7 14h10l-5 4.5-5-4.5v-4z' fill='white'/%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#050505',
              surface: '#0D0F14',
              surfaceHighlight: '#161922',
              textPrimary: '#FFFFFF',
              textSecondary: '#A8ADB7',
              textMuted: '#6F7582',
              brand: {
                start: '#FF3B5C',
                end: '#FF8A3D',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            },
            boxShadow: {
              'glow': '0 0 40px -10px rgba(255, 59, 92, 0.4)',
              'glow-subtle': '0 0 20px -5px rgba(255, 138, 61, 0.15)',
              'card': '0 10px 40px -10px rgba(0, 0, 0, 0.6)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #050505;
        color: #ffffff;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: none;
      }
      html {
        height: -webkit-fill-available;
      }
      /* Safe area padding for notched devices */
      .safe-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .safe-top {
        padding-top: env(safe-area-inset-top, 0px);
      }
      /* Prevent pull-to-refresh on modals */
      .modal-scroll {
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #1A1D24;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2A2D35;
      }

      /* Article Reader Styles */
      .article-content {
        line-height: 1.85;
        font-size: 1.15rem;
        color: #D1D5DB;
        word-wrap: break-word;
      }
      
      .article-content a { 
        color: #FF8A3D; 
        text-decoration: underline; 
        text-underline-offset: 4px; 
      }
      .article-content a:hover { color: #FF3B5C; }
      
      .article-content img { 
        border-radius: 1.25rem; 
        margin: 2.5rem auto; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      }
      
      .article-content h1, .article-content h2, .article-content h3 { color: white; margin-top: 2.5rem; font-weight: 700; letter-spacing: -0.025em; }
      .article-content blockquote {
        border-left: 6px solid #FF3B5C;
        background: rgba(255,255,255,0.04);
        color: #E5E7EB;
        padding: 1.5rem;
        font-style: italic;
        border-radius: 0 1rem 1rem 0;
        margin: 2rem 0;
      }

      @keyframes loading-bar {
        0% { transform: translateX(-100%); width: 20%; }
        50% { width: 40%; }
        100% { transform: translateX(300%); width: 20%; }
      }
    </style>
</head>
  <body class="antialiased">
    <div id="root">
        <!-- Initial Loader stays until React takes over -->
        <div class="fixed inset-0 flex items-center justify-center bg-[#050505] z-[9999]">
            <div class="animate-in fade-in zoom-in-95 duration-500 flex flex-col items-center gap-6">
                <div class="w-16 h-16 border-[5px] border-brand-start border-t-transparent rounded-full animate-spin shadow-glow"></div>
                <p class="font-outfit font-bold text-2xl tracking-tighter text-white pr-4">StackReader <span class="inline-block text-transparent bg-clip-text bg-gradient-to-r from-brand-start to-brand-end pr-1">Pro</span></p>
            </div>
        </div>
    </div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
</body>
</html>
